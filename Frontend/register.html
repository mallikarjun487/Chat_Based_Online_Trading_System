<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading System - Register</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-wrap">
        <div class="brand">Trade<span>Bridge</span></div>
        <p class="header-subtext">Create your trading account</p>
      </div>
    </header>

    <nav class="top-nav">
      <a href="/">Home</a>
      <a href="/login.html">Login</a>
      <a class="active" href="/register.html">Register</a>
      <a href="/portfolio.html">Portfolio</a>
      <a href="/trades.html">Trades</a>
      <a href="/chat.html">Chatbot</a>
      <a href="/news.html">News</a>
    </nav>

    <main>
      <section class="card">
        <div class="section-head">
          <h2>Register</h2>
          <p>Create your profile to start trading</p>
        </div>
        <form id="registerForm">
          <input name="name" placeholder="Name" required />
          <input name="email" type="email" placeholder="Email" required />
          <input name="password" type="password" placeholder="Password" required />
          <button type="submit">Register</button>
        </form>
        <p class="muted">Already have an account? <a href="/login.html">Login</a></p>
        <p id="authStatus" class="status"></p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-wrap">
        <p class="muted">© 2026 TradeBridge. Built for learning and growing.</p>
        <div class="footer-links">
          <a href="/about.html">About</a>
          <a href="/contact.html">Contact</a>
          <a href="/terms.html">Terms</a>
        </div>
      </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
