<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading System - Portfolio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-wrap">
        <div class="brand">Trade<span>Bridge</span></div>
        <p class="header-subtext">Track your holdings and profile</p>
      </div>
    </header>

    <nav class="top-nav">
      <a href="/">Home</a>
      <a href="/login.html">Login</a>
      <a href="/register.html">Register</a>
      <a class="active" href="/portfolio.html">Portfolio</a>
      <a href="/trades.html">Trades</a>
      <a href="/chat.html">Chatbot</a>
      <a href="/news.html">News</a>
    </nav>

    <main>
      <section class="card">
        <div class="section-head">
          <h2>My Portfolio</h2>
          <p>Update your profile and cash balance</p>
        </div>
        <button id="loadProfileBtn" class="btn-light">Refresh Profile</button>
        <form id="profileForm">
          <input name="name" placeholder="Update name" />
          <input name="cashBalance" type="number" step="0.01" placeholder="Update cash balance" />
          <button type="submit">Update Profile</button>
        </form>
        <div id="profileOutput" class="portfolio-dashboard"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-wrap">
        <p class="muted">© 2026 TradeBridge. Built for learning and growing.</p>
        <div class="footer-links">
          <a href="/about.html">About</a>
          <a href="/contact.html">Contact</a>
          <a href="/terms.html">Terms</a>
        </div>
      </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
